# Application properties for tests
spring.application.name=padelplay-server-test

# Google OAuth properties for tests
GOOGLE_CLIENT_ID=dummy-client-id
GOOGLE_CLIENT_SECRET=dummy-client-secret
google.client-id=dummy-client-id

spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret

# JWT Configuration for tests
jwt.secret=padelplay-test-secret-key-at-least-256-bits-long-for-hs256-encryption
jwt.expiration=86400000

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:padelplaydb_test
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=padel
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
