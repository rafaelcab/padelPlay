<!DOCTYPE html>
<html class="dark" lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#4c5d00",
              "on-surface-variant": "#aaabad",
              "surface-container-lowest": "#000000",
              "on-surface": "#eeeef0",
              "surface-container-high": "#1d2023",
              "outline-variant": "#46484a",
              "surface-bright": "#292c30",
              "surface": "#0c0e10",
              "surface-variant": "#232629",
              "primary": "#f4ffc6",
              "primary-container": "#d1fc00",
              "surface-container-low": "#111416",
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-glow {
            box-shadow: 0 0 30px rgba(209, 252, 0, 0.15);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center overflow-x-hidden">

<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-primary-container/20 via-transparent to-transparent"></div>
</div>

<main class="w-full max-w-2xl px-6 py-12 md:py-20 flex flex-col items-center text-center">
    
    <div class="mb-8 relative">
        <div class="absolute inset-0 bg-primary-container blur-3xl opacity-20 rounded-full"></div>
        <div class="relative w-24 h-24 bg-surface-container-highest rounded-full flex items-center justify-center border-2 border-primary-container/30">
            <span class="material-symbols-outlined text-primary-container text-6xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>
    </div>

    <h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface mb-4">
        ¡Partido Creado con Éxito!
    </h1>
    <p class="font-body text-on-surface-variant text-lg max-w-md mb-12">
        Tu partido ya está disponible. Ya puedes cerrar esta pestaña o compartir los detalles.
    </p>

    <div th:if="${partido.codigoAcceso != null}" class="w-full bg-surface-container-high rounded-3xl p-8 mb-8 kinetic-glow border border-white/5 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-container/10 blur-3xl rounded-full"></div>
        <div class="flex flex-col items-center gap-2 relative z-10">
            <span class="font-label text-on-surface-variant text-xs font-bold uppercase tracking-widest">Código de Acceso</span>
            <div class="flex flex-col sm:flex-row items-center gap-4 mt-2">
                <span class="font-headline text-5xl font-black italic tracking-tighter text-primary-container" th:text="${partido.codigoAcceso}">VP-2026-X</span>
                <button class="flex items-center gap-2 bg-surface-bright hover:bg-surface-container-highest text-on-surface px-4 py-2 rounded-xl transition-all active:scale-95 group">
                    <span class="material-symbols-outlined text-lg group-hover:text-primary-container">content_copy</span>
                    <span class="font-label font-bold text-sm uppercase">Copiar</span>
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mb-12">
        
        <div class="bg-surface-container-low rounded-2xl p-6 text-left border border-white/5">
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <span class="text-on-surface-variant text-sm font-medium">Pista</span>
                    <span class="text-on-surface font-headline font-bold" th:text="${partido.ubicacion}">Central 4</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-on-surface-variant text-sm font-medium">Fecha</span>
                    <span class="text-on-surface font-headline font-bold" th:text="${#temporals.format(partido.fechaHora, 'dd MMM, yyyy')}">12 Oct, 2026</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-on-surface-variant text-sm font-medium">Hora</span>
                    <span class="text-on-surface font-headline font-bold" th:text="${#temporals.format(partido.fechaHora, 'HH:mm')} + ' h'">18:30 h</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-on-surface-variant text-sm font-medium">Tipo</span>
                    <span class="px-3 py-1 bg-primary-container/10 text-primary-container rounded-lg text-xs font-black uppercase" th:text="${partido.tipoPartido}">ABIERTO</span>
                </div>
            </div>
        </div>

        <div class="bg-surface-container-low rounded-2xl p-6 border border-white/5">
            <h3 class="text-on-surface-variant text-xs font-black uppercase tracking-widest mb-4 text-left">Disponibilidad</h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 rounded-full ring-2 ring-primary-container ring-offset-2 ring-offset-surface-container-low overflow-hidden">
                        <img class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Tu&background=random"/>
                    </div>
                    <span class="text-[10px] text-primary-container font-bold uppercase">Tú</span>
                </div>
                <div class="flex flex-col items-center gap-2" th:each="i : ${#numbers.sequence(1, 3)}">
                    <div class="w-12 h-12 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center bg-surface/50">
                        <span class="material-symbols-outlined text-outline-variant text-lg">add</span>
                    </div>
                    <span class="text-[10px] text-on-surface-variant font-medium uppercase">Libre</span>
                </div>
            </div>
        </div>
    </div>

    <div class="flex flex-col w-full gap-4">
        <a th:href="@{/partidos/crear}" class="w-full py-5 bg-primary-container text-on-primary-container font-headline font-black text-lg rounded-2xl shadow-xl shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
            Crear otro partido
            <span class="material-symbols-outlined">add_circle</span>
        </a>
    </div>

</main>
</body>
</html>
