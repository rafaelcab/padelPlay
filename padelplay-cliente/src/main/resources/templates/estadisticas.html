<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::style}, ~{::div#content-wrapper})}">
<head>
    <title>Estadísticas - PadelPlay</title>
    <style>
        .card {
            background: #1d2023;
            border: 1px solid #2c3136;
        }
    </style>
</head>
<body>
<div id="content-wrapper" class="w-full pt-24 pb-16 px-6 max-w-6xl mx-auto">
    <h1 class="font-headline text-5xl font-extrabold tracking-tighter text-[#D4FF00] italic mb-4">ESTADÍSTICAS</h1>
    <p class="text-slate-400 mb-8">Ocupación por hora del club para la fecha seleccionada.</p>

    <div th:if="${error}" class="bg-red-500/10 border border-red-500 text-red-400 p-3 rounded-xl mb-6" th:text="${error}"></div>

    <form method="get" action="/estadisticas" class="card rounded-2xl p-6 mb-8 flex flex-col md:flex-row gap-4 md:items-end">
        <div>
            <label class="text-xs uppercase text-slate-400 font-bold">Fecha</label>
            <input type="date" name="fecha" th:value="${fecha}" class="w-full mt-2 bg-[#111416] text-white rounded-xl p-3 border border-slate-700" required>
        </div>
        <button type="submit" class="px-6 py-3 rounded-full bg-[#D4FF00] text-black font-bold uppercase tracking-wider">Actualizar</button>
    </form>

    <div class="card rounded-2xl p-6 overflow-x-auto">
        <table class="w-full text-left text-sm">
            <thead>
            <tr class="text-slate-400 uppercase tracking-widest text-xs border-b border-slate-700">
                <th class="py-3">Hora</th>
                <th class="py-3">Ocupación</th>
                <th class="py-3">Visual</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${ocupaciones}" class="border-b border-slate-800">
                <td class="py-3 text-white font-semibold" th:text="${item.hora}">10:00</td>
                <td class="py-3 text-slate-200" th:text="${#numbers.formatDecimal(item.porcentajeOcupacion, 1, 2) + '%'}">50.00%</td>
                <td class="py-3">
                    <div class="w-full bg-slate-800 rounded-full h-2">
                        <div class="bg-[#D4FF00] h-2 rounded-full" th:style="${'width:' + item.porcentajeOcupacion + '%'}"></div>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
