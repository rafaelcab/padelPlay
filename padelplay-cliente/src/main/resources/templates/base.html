<!DOCTYPE html>
<html class="dark" lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (title, links, content)">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:replace="${title}">Vantage Padel</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #000000;
            color: #eeeef0;
            font-family: 'Inter', sans-serif;
        }

        .glass-nav {
            background: rgba(12, 14, 16, 0.7);
            backdrop-filter: blur(20px);
        }

        /* Estilo para que el menú flote con efecto cristal */
        .glass-dropdown {
            background: rgba(12, 14, 16, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <th:block th:replace="${links}" />
</head>

<body class="bg-black min-h-screen">

    <header
        class="fixed top-0 w-full z-50 glass-nav shadow-[0_20px_40px_rgba(0,0,0,0.4)] h-20 flex justify-between items-center px-8">
        <div class="flex items-center gap-3 group cursor-pointer" onclick="window.location.href='/perfil/dashboard'">
            <span
                class="text-[#D4FF00] font-black italic text-2xl tracking-tighter uppercase font-headline">PadelPlay</span>
        </div>

        <nav class="hidden md:flex items-center gap-10" id="main-nav">
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/perfil/dashboard}" data-nav-path="/perfil/dashboard">Home</a>
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/partidos}" data-nav-prefix="/partidos" data-nav-exclude="/partidos/crear">Partidos</a>
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/partidos/crear}" data-nav-path="/partidos/crear">Crear</a>
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/entrenadores}" data-nav-prefix="/entrenadores">Entrenador</a>
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/perfil/evaluacion}" data-nav-prefix="/perfil/evaluacion">Evaluación</a>
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/comunidad}" data-nav-prefix="/comunidad">Comunidad</a>
            <a class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/torneos}" data-nav-path="/torneos">Torneos</a>
            <a th:if="${esAdminClub}"
                class="font-headline tracking-tight font-bold uppercase text-sm text-slate-400 hover:text-slate-100 transition-colors"
                th:href="@{/estadisticas}" data-nav-path="/estadisticas">Stats</a>
        </nav>

        <div class="flex items-center gap-6">

            <div class="relative">
                <button id="notifications-button"
                    class="relative text-slate-400 hover:text-[#D4FF00] transition-colors p-2 rounded-full hover:bg-white/5 active:scale-90"
                    type="button" aria-haspopup="true" aria-expanded="false">
                    <span class="material-symbols-outlined">notifications</span>
                    <span id="notifications-badge"
                        class="absolute top-1.5 right-1.5 hidden w-2.5 h-2.5 rounded-full bg-red-500 border border-black"></span>
                </button>

                <div id="notifications-panel"
                    class="absolute right-0 mt-4 w-[22rem] origin-top-right rounded-2xl glass-dropdown shadow-2xl opacity-0 invisible translate-y-2 transition-all duration-200 z-50 overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
                        <div>
                            <p class="font-headline text-sm uppercase tracking-tight text-white font-bold">
                                Notificaciones</p>
                            <p class="text-xs text-slate-400">Recordatorios de partidos</p>
                        </div>
                        <button id="notifications-refresh" type="button"
                            class="text-slate-400 hover:text-[#D4FF00] transition-colors">
                            <span class="material-symbols-outlined text-[20px]">refresh</span>
                        </button>
                    </div>
                    <div id="notifications-list" class="max-h-96 overflow-y-auto p-2">
                        <div id="notifications-empty" class="px-3 py-6 text-sm text-slate-400 text-center">
                            No hay notificaciones nuevas.
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${estado != null && (estado.tienePerfilJugador || estado.tienePerfilEntrenador)}">
                <form th:action="@{/perfil/cambiar-rol}" method="post" style="display: contents;">
                    <input type="hidden" name="rol"
                        th:value="${estado.rolActivo == 'JUGADOR' ? 'ENTRENADOR' : 'JUGADOR'}">
                    <button type="submit"
                        th:disabled="${estado.rolActivo == 'JUGADOR' ? !estado.tienePerfilEntrenador : !estado.tienePerfilJugador}"
                        class="group px-6 py-2.5 rounded-full bg-[#1d2023] border border-slate-800 hover:bg-[#D4FF00] transition-all duration-300 flex items-center gap-2"
                        th:classappend="${(estado.rolActivo == 'JUGADOR' && !estado.tienePerfilEntrenador) || (estado.rolActivo == 'ENTRENADOR' && !estado.tienePerfilJugador) ? 'opacity-50 cursor-not-allowed' : ''}">
                        <span
                            class="material-symbols-outlined text-[#D4FF00] group-hover:text-black transition-colors">swap_horiz</span>
                        <span
                            class="font-headline tracking-tight font-bold uppercase text-xs text-[#D4FF00] group-hover:text-black transition-colors"
                            th:text="${estado.rolActivo == 'JUGADOR'} ? 'Switch to Coach' : 'Switch to Player'">Switch</span>
                    </button>
                </form>
            </div>

            <div class="relative group pt-2">
                <div
                    class="w-11 h-11 rounded-full bg-slate-800 flex items-center justify-center overflow-hidden border-2 border-slate-700 group-hover:border-[#D4FF00] cursor-pointer transition-all duration-300">
                    <img alt="Profile" class="w-full h-full object-cover"
                        th:src="${estado != null && estado.pictureUrl != null ? estado.pictureUrl : 'https://lh3.googleusercontent.com/aida-public/AB6AXuCnoZNX12NJLATjw1LLNxe3nmhMuGUkfnnBRep2SPnmip00TUcU9y8ItbdFDrPwwErPuI_jSIQa6VJzWgcF2xv7nIkxTZp_s2_El6W8SZpk3TVSL2jMR8gHm9Gw5mc1-YqLZma5WBWpU1q5O5HnBz1a4d3hDqmaFvJZSLYVMHwjFsPAidYrG7i1JKMnR5V7BdAYCvDkREXKyldSl1DmDNPmKONTSlf5VnCMJTbAl76zux2frzzy9lBeN6u4S7aulOgf0XTmMVQ2v8Nw'}" />
                </div>

                <div class="absolute right-0 mt-5 w-52 origin-top-right rounded-2xl glass-dropdown shadow-2xl 
                opacity-0 invisible group-hover:opacity-100 group-hover:visible 
                transition-all duration-300 delay-150 z-50 py-2 px-1">

                    <div
                        class="absolute -top-2 right-4 w-4 h-4 bg-[#0c0e10]/90 rotate-45 border-l border-t border-white/10">
                    </div>

                    <div class="relative z-10">
                        <a href="/perfil/mi-perfil"
                            class="flex items-center gap-3 px-4 py-3 text-sm text-slate-200 hover:bg-[#D4FF00]/10 hover:text-[#D4FF00] rounded-xl transition-colors">
                            <span class="material-symbols-outlined text-[20px]">person</span>
                            <span class="font-medium">Mi Perfil</span>
                        </a>
                        <a href="#"
                            class="flex items-center gap-3 px-4 py-3 text-sm text-slate-200 hover:bg-[#D4FF00]/10 hover:text-[#D4FF00] rounded-xl transition-colors">
                            <span class="material-symbols-outlined text-[20px]">history</span>
                            <span class="font-medium">Mis Partidos</span>
                        </a>
                        <div class="my-1 border-t border-white/10 mx-2"></div>
                        <a href="/logout"
                            class="flex items-center gap-3 px-4 py-3 text-sm text-red-400 hover:bg-red-500/10 rounded-xl transition-colors">
                            <span class="material-symbols-outlined text-[20px]">logout</span>
                            <span class="font-medium">Cerrar Sesión</span>
                        </a>
                    </div>
                </div>
            </div>
    </header>

    <main class="pt-24" th:replace="${content}">
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var currentPath = window.location.pathname.replace(/\/+$/, '') || '/';
            var navLinks = document.querySelectorAll('#main-nav a[data-nav-path], #main-nav a[data-nav-prefix]');
            var notificationsButton = document.getElementById('notifications-button');
            var notificationsPanel = document.getElementById('notifications-panel');
            var notificationsRefresh = document.getElementById('notifications-refresh');
            var notificationsList = document.getElementById('notifications-list');
            var notificationsEmpty = document.getElementById('notifications-empty');
            var notificationsBadge = document.getElementById('notifications-badge');
            var seenStorageKey = 'padelplay_seen_notifications';
            var currentUnseenNotifications = [];
            var currentAllNotifications = [];
            var notificationsOpen = false;

            function getSeenNotifications() {
                try {
                    var raw = localStorage.getItem(seenStorageKey);
                    return raw ? JSON.parse(raw) : [];
                } catch (error) {
                    return [];
                }
            }

            function saveSeenNotifications(ids) {
                localStorage.setItem(seenStorageKey, JSON.stringify(ids));
            }

            function isSeen(id) {
                return getSeenNotifications().includes(String(id));
            }

            function markAsSeen(notifications) {
                if (!notifications.length) {
                    return;
                }

                var seen = getSeenNotifications();
                notifications.forEach(function (notification) {
                    var id = String(notification.id);
                    if (!seen.includes(id)) {
                        seen.push(id);
                    }
                });
                saveSeenNotifications(seen);
            }

            function setBadgeCount(count) {
                if (!notificationsBadge) {
                    return;
                }

                if (count > 0) {
                    notificationsBadge.classList.remove('hidden');
                } else {
                    notificationsBadge.classList.add('hidden');
                }
            }

            function formatDate(value) {
                return new Intl.DateTimeFormat('es-ES', {
                    day: '2-digit',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                }).format(new Date(value));
            }

            function renderNotifications(notifications) {
                if (!notificationsList || !notificationsEmpty) {
                    return;
                }

                notificationsList.innerHTML = '';

                if (!notifications.length) {
                    notificationsEmpty.classList.remove('hidden');
                    notificationsList.appendChild(notificationsEmpty);
                    return;
                }

                notificationsEmpty.classList.add('hidden');

                notifications.forEach(function (notification) {
                    var seen = isSeen(notification.id);
                    var item = document.createElement('a');
                    item.href = '/partidos';
                    item.className = 'flex items-start gap-3 px-3 py-3 rounded-xl hover:bg-white/5 transition-colors border border-transparent hover:border-white/10 ' + (seen ? 'opacity-70' : '');

                    var icon = document.createElement('div');
                    icon.className = 'mt-0.5 w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 ' + (seen ? 'bg-slate-700/40 text-slate-400' : 'bg-[#D4FF00]/10 text-[#D4FF00]');
                    icon.innerHTML = '<span class="material-symbols-outlined text-[18px]">sports_tennis</span>';

                    var content = document.createElement('div');
                    content.className = 'min-w-0 flex-1';

                    var title = document.createElement('p');
                    title.className = 'text-sm font-bold leading-tight ' + (seen ? 'text-slate-300' : 'text-white');
                    title.textContent = notification.titulo;

                    var message = document.createElement('p');
                    message.className = 'text-sm text-slate-300 mt-1 leading-snug';
                    message.textContent = notification.mensaje;

                    var meta = document.createElement('p');
                    meta.className = 'text-xs text-slate-500 mt-2';
                    meta.textContent = formatDate(notification.programadoPara) + ' · ' + notification.ubicacion;

                    if (!seen) {
                        var dot = document.createElement('span');
                        dot.className = 'inline-block w-2 h-2 rounded-full bg-red-500 ml-2';
                        title.appendChild(dot);
                    }

                    content.appendChild(title);
                    content.appendChild(message);
                    content.appendChild(meta);
                    item.appendChild(icon);
                    item.appendChild(content);
                    notificationsList.appendChild(item);
                });
            }

            function loadNotifications(options) {
                options = options || {};
                var renderPanel = !!options.renderPanel;
                return fetch('/api/notificaciones/recordatorios')
                    .then(function (response) {
                        if (response.status === 401) {
                            currentUnseenNotifications = [];
                            currentAllNotifications = [];
                            setBadgeCount(0);
                            if (renderPanel) {
                                renderNotifications([]);
                            }
                            return [];
                        }
                        if (!response.ok) {
                            throw new Error('No se pudieron cargar las notificaciones');
                        }
                        return response.json();
                    })
                    .then(function (data) {
                        var notifications = Array.isArray(data) ? data : [];
                        var unseen = notifications.filter(function (notification) {
                            return !isSeen(notification.id);
                        });

                        currentAllNotifications = notifications;
                        currentUnseenNotifications = unseen;
                        setBadgeCount(notifications.length);

                        if (renderPanel) {
                            renderNotifications(notifications);
                            markAsSeen(unseen);
                            currentUnseenNotifications = [];
                            setBadgeCount(currentAllNotifications.length);
                        }
                    })
                    .catch(function () {
                        if (renderPanel) {
                            renderNotifications(currentAllNotifications);
                        }
                        setBadgeCount(currentAllNotifications.length);
                    });
            }

            function openNotificationsPanel() {
                if (!notificationsPanel) {
                    return;
                }

                notificationsPanel.classList.remove('invisible', 'opacity-0', 'translate-y-2');
                notificationsPanel.classList.add('visible', 'opacity-100', 'translate-y-0');
                notificationsOpen = true;
                if (notificationsButton) {
                    notificationsButton.setAttribute('aria-expanded', 'true');
                }
                loadNotifications({ renderPanel: true });
            }

            function closeNotificationsPanel() {
                if (!notificationsPanel) {
                    return;
                }

                notificationsPanel.classList.add('invisible', 'opacity-0', 'translate-y-2');
                notificationsPanel.classList.remove('visible', 'opacity-100', 'translate-y-0');
                notificationsOpen = false;
                if (notificationsButton) {
                    notificationsButton.setAttribute('aria-expanded', 'false');
                }
            }

            if (notificationsButton) {
                notificationsButton.addEventListener('click', function (event) {
                    event.stopPropagation();
                    if (notificationsOpen) {
                        closeNotificationsPanel();
                    } else {
                        openNotificationsPanel();
                    }
                });
            }

            if (notificationsRefresh) {
                notificationsRefresh.addEventListener('click', function (event) {
                    event.stopPropagation();
                    loadNotifications({ renderPanel: notificationsOpen });
                });
            }

            document.addEventListener('click', function (event) {
                if (notificationsPanel && !notificationsPanel.contains(event.target) && !notificationsButton.contains(event.target)) {
                    closeNotificationsPanel();
                }
            });

            loadNotifications({ renderPanel: false });
            window.setInterval(function () {
                loadNotifications({ renderPanel: notificationsOpen });
            }, 60000);

            navLinks.forEach(function (link) {
                var path = link.getAttribute('data-nav-path');
                var prefix = link.getAttribute('data-nav-prefix');
                var exclude = link.getAttribute('data-nav-exclude');
                var isActive = false;

                if (path) {
                    isActive = currentPath === path;
                } else if (prefix) {
                    isActive = (currentPath === prefix || currentPath.indexOf(prefix + '/') === 0) && currentPath !== exclude;
                }

                if (isActive) {
                    link.classList.remove('text-slate-400', 'hover:text-slate-100');
                    link.classList.add('text-[#D4FF00]', 'border-b-2', 'border-[#D4FF00]', 'pb-1');
                }
            });
        });
    </script>

</body>

</html>
