<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::style}, ~{::main})}">

<head>
    <title>Historial de Partidos - PadelPlay</title>
    <style>
        /* Contenido principal */
        /* Botón Volver estilizado */
        .header-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            width: fit-content;
        }

        .btn-back:hover {
            color: #D4FF00;
            transform: translateX(-5px);
        }

        .btn-back .material-symbols-outlined {
            font-size: 20px;
        }

        .page-title {
            font-size: 32px; /* Un poco más grande */
            color: #eeeef0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .main-content {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 28px;
            color: #eeeef0;
            margin-bottom: 30px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
        }

        .card {
            background: #1d2023;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #eeeef0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-item {
            background: #111416;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .match-item:hover {
            border-color: #D4FF00;
            transform: translateY(-2px);
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-date {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }

        .match-location {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        .match-details {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-level {
            font-size: 12px;
            color: #000;
            background: #D4FF00;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .match-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .status-created {
            background: #D4FF00;
            color: #000;
        }

        .status-joined {
            background: #3b82f6;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .btn-back {
            background: #334155;
            color: #cbd5e1;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #475569;
            color: #fff;
        }
    </style>
</head>

<main class="main-content">
    
    <div class="header-container">
        <a href="/perfil" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
            VOLVER AL PERFIL
        </a>
        <h1 class="page-title">Mi Historial de Partidos</h1>
    </div>

    <div th:if="${error}" class="card" style="border-color: #ef4444;">
        <div class="empty-state">
            <span class="material-symbols-outlined" style="color: #ef4444; font-size: 48px; margin-bottom: 10px;">error</span>
            <p th:text="${error}"></p>
        </div>
    </div>

    <div class="card" th:if="${partidosHistorial != null && !partidosHistorial.empty}">
        <div class="card-header">
            <div class="card-title">
                <span class="material-symbols-outlined" style="color: #D4FF00;">history</span>
                Todos mis partidos
            </div>
        </div>

        <div class="match-list">
            <div th:each="partido : ${partidosHistorial}" class="match-item">
                <div class="match-info">
                    <span class="match-date">
                        <span class="material-symbols-outlined" style="font-size: 14px; vertical-align: middle;">calendar_month</span>
                        <span th:text="${#temporals.format(partido.fechaHora, 'dd MMM, yyyy - HH:mm')}"></span>
                    </span>
                    <div class="match-location">
                        <span class="material-symbols-outlined" style="color: #D4FF00; font-size: 18px;">location_on</span>
                        <span th:text="${partido.ubicacion}">Ubicación</span>
                    </div>
                </div>
                <div class="match-details">
                    <div class="match-level">
                        Nivel requerido: <strong th:text="${partido.nivelRequerido}" style="color: #000000;"></strong>
                    </div>
                    <div class="match-status"
                         th:classappend="${partido.creador.id == estado.perfilJugador.id} ? 'status-created' : 'status-joined'"
                         th:text="${partido.creador.id == estado.perfilJugador.id} ? 'Organizador' : 'Participante'">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card" th:if="${partidosHistorial == null || partidosHistorial.empty}">
        <div class="empty-state">
            <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 20px; opacity: 0.3;">sports_tennis</span>
            <p>No tienes partidos registrados aún.</p>
            <p style="font-size: 14px;">¡Crea tu primer partido o únete a uno existente!</p>
            <a href="/partidos/explorar" class="btn-back" style="margin-top: 20px; color: #D4FF00; border: 1px solid #D4FF00; padding: 8px 20px; border-radius: 20px;">Explorar Partidos</a>
        </div>
    </div>
</main>

</html>
