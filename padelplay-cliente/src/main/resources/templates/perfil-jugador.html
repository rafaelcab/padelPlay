<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil de Jugador - PadelPlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #444;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
            border: none;
            padding: 14px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .progress-step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
        }

        .progress-step.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .help-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏸</div>
            <h1>Configura tu Perfil de Jugador</h1>
            <p class="subtitle">Cuéntanos sobre ti para encontrar los mejores compañeros de juego</p>
        </div>

        <div class="progress-indicator">
            <div class="progress-step active"></div>
            <div class="progress-step"></div>
        </div>

        <div class="error-message" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/perfil/jugador/guardar}" th:object="${perfil}">
            <div class="card">
                <div class="card-title">📝 Información Básica</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="apodo">Apodo / Nickname</label>
                        <input type="text" id="apodo" name="apodo" th:value="${perfil?.apodo}"
                               placeholder="¿Cómo te llaman en la pista?">
                        <p class="help-text">Opcional - Será visible para otros jugadores</p>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono de contacto</label>
                        <input type="tel" id="telefono" name="telefono" th:value="${perfil?.telefono}"
                               placeholder="+34 600 000 000">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="aniosExperiencia">Años de experiencia</label>
                        <select id="aniosExperiencia" name="aniosExperiencia">
                            <option value="">Selecciona...</option>
                            <option value="0" th:selected="${perfil?.aniosExperiencia == 0}">Menos de 1 año</option>
                            <option value="1" th:selected="${perfil?.aniosExperiencia == 1}">1 año</option>
                            <option value="2" th:selected="${perfil?.aniosExperiencia == 2}">2 años</option>
                            <option value="3" th:selected="${perfil?.aniosExperiencia == 3}">3 años</option>
                            <option value="5" th:selected="${perfil?.aniosExperiencia == 5}">4-5 años</option>
                            <option value="7" th:selected="${perfil?.aniosExperiencia == 7}">6-10 años</option>
                            <option value="10" th:selected="${perfil?.aniosExperiencia >= 10}">Más de 10 años</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="nivelJuego">Nivel de juego</label>
                        <select id="nivelJuego" name="nivelJuego">
                            <option value="">Selecciona...</option>
                            <option th:each="nivel : ${opciones?.nivelesJuego}"
                                    th:value="${nivel.valor}"
                                    th:text="${nivel.descripcion}"
                                    th:selected="${perfil?.nivelJuego == nivel.valor}">
                            </option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                Continuar → Detalles Técnicos
            </button>
        </form>
    </div>
</body>
</html>
