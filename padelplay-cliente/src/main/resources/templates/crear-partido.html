<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
  th:replace="~{base :: layout(~{::title}, ~{::#page-styles}, ~{::main})}">

<head>
  <title>Crear Partido | PADELPLAY</title>
  <th:block id="page-styles">
    <link rel="stylesheet" th:href="@{/css/crear-partido.css}" />
  </th:block>
</head>

<body>

  <main class="page pt-18 pb-12">
    <div class="container">

      <header class="header mb-12">
        <span
          class="text-[#D4FF00] font-headline font-bold tracking-widest text-xs uppercase mb-2 block">PADELPLAY</span>
        <h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tighter text-white mb-4 italic uppercase">
          CREA TU <span class="text-[#D4FF00]">PARTIDO</span>
        </h1>
        <p class="text-slate-400 font-body text-lg max-w-xl">Fija las reglas, selecciona la pista y convoca a la élite
          del pádel.</p>
      </header>

      <div th:if="${error}"
        class="bg-red-500/10 border border-red-500 text-red-500 p-4 rounded-xl mb-8 text-center font-bold">
        <span th:text="${error}"></span>
      </div>

      <form class="form" autocomplete="off" th:action="@{/partidos/crear}" th:object="${partido}" method="POST">

        <div class="row-2">
          <div class="field">
            <label class="label">SELECCIONA LA PISTA:</label>
            <div class="input-wrap">
              <input class="input" type="text" th:field="*{ubicacion}" placeholder="Ej: Padel Club Central..."
                required />
            </div>
          </div>

          <div class="field">
            <label class="label">HORARIO:</label>
            <div class="input-wrap">
              <input class="input input-date" type="datetime-local" th:field="*{fechaHora}" required />
            </div>
          </div>
        </div>
        <br>

        <input type="hidden" th:field="*{tipoPartido}" id="match_type_value" />

        <div class="field">
          <label class="label">TIPO DE PARTIDO:</label>
          <div class="match-types">
            <button type="button" class="type-card active" data-value="open">ABIERTO</button>
            <button type="button" class="type-card" data-value="private">PRIVADO</button>
            <button type="button" class="type-card" data-value="competitive" disabled>COMPETITIVO
              (Próximamente)</button>
          </div>
        </div>
        <br>

        <div class="field">
          <div class="level-header">
            <label class="label">NIVEL REQUERIDO: </label>
            <span class="level-value" id="level-display">LVL 4.0</span>
          </div>
          <div class="slider-wrap">
            <input class="slider" type="range" th:field="*{nivelRequerido}" min="1" max="5" step="0.5" value="4.0" />
          </div>
        </div>
        <br>

        <div class="cta-wrap">
          <button class="cta-btn shadow-[0_0_20px_rgba(212,255,0,0.2)]" type="submit">CREA EL PARTIDO</button>
        </div>

      </form>
    </div>

    <script>
      // Lógica de botones de tipo de partido
      const matchTypeInput = document.getElementById('match_type_value');

      if (!matchTypeInput.value) {
        matchTypeInput.value = 'open';
      }

      document.querySelectorAll('.type-card').forEach(btn => {
        if (!btn.disabled) {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            matchTypeInput.value = btn.dataset.value;
          });
        }
      });

      // Lógica del slider de nivel
      const slider = document.querySelector('.slider');
      const levelDisplay = document.getElementById('level-display');

      function updateSlider() {
        levelDisplay.textContent = 'LVL ' + parseFloat(slider.value).toFixed(1);
      }

      if (slider) {
        slider.addEventListener('input', updateSlider);
        updateSlider();
      }
    </script>
  </main>
</body>

</html>
