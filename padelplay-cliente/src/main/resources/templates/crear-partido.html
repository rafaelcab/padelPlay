<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::#page-styles}, ~{::main})}">
<head>
  <title>Crear Partido | PADELPLAY</title>
  <th:block id="page-styles">
    <link rel="stylesheet" th:href="@{/css/crear-partido.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  </th:block>
</head>
<body>

  <main class="page">
    <div class="container">

      <header class="header">
        <span class="eyebrow">PADELPLAY</span>
        <h1 class="title">CREA TU PARTIDO</h1>
        <p class="subtitle">Crea el partido, fija las reglas y convoca a la élite</p>
      </header>
      
      <div th:if="${error}" style="color: red; font-weight: bold; margin-bottom: 20px;">
          <span th:text="${error}"></span>
      </div>

      <form class="form" autocomplete="off" th:action="@{/partidos/crear}" th:object="${partido}" method="POST">
        
        <input type="hidden" th:field="*{idCreador}" value="1" id="idCreador" />

        <div class="row-2">
          <div class="field">
            <label class="label">SELECCIONA LA PISTA:</label>
            <div class="input-wrap">
              <input class="input" type="text" th:field="*{ubicacion}" placeholder="Search club or court..." required/>
            </div>
          </div>
          <br>
          <div class="field">
            <label class="label">HORARIO:</label>
            <div class="input-wrap">
              <input class="input input-date" type="datetime-local" th:field="*{fechaHora}" required/>
            </div>
          </div>
        </div>
        <br>

        <input type="hidden" th:field="*{tipoPartido}" id="match_type_value" />
        <div class="field">
          <label class="label">TIPO DE PARTIDO:</label>
          <div class="match-types">
            <button type="button" class="type-card active" data-value="open">ABIERTO</button>
            <button type="button" class="type-card" data-value="private">PRIVADO</button>
            <button type="button" class="type-card" data-value="competitive" disabled>COMPETITIVO (Deshabilitado)</button>
          </div>
        </div>
        <br>

        <div class="field">
          <div class="level-header">
            <label class="label">NIVEL REQUERIDO: </label>
            <span class="level-value" id="level-display">LVL 4.0</span>
          </div>
          <div class="slider-wrap">
            <input class="slider" type="range" th:field="*{nivelRequerido}" min="1" max="5" step="0.5" value="4.0"/>
          </div>
        </div>
        <br>

        <div class="cta-wrap">
          <button class="cta-btn" type="submit">CREA EL PARTIDO</button>
        </div>

      </form>
    </div>

    <script>
      // --- SCRIPT PARA LOS BOTONES DE TIPO DE PARTIDO ---
      const matchTypeInput = document.getElementById('match_type_value');
      
      // Forzamos que por defecto sea "open" si está vacío
      if (!matchTypeInput.value) {
          matchTypeInput.value = 'open';
      }

      document.querySelectorAll('.type-card').forEach(btn => {
        if(!btn.disabled) {
            btn.addEventListener('click', () => {
              // Quitamos la clase active de todos y se la ponemos al pulsado
              document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
              btn.classList.add('active');
              // Guardamos el valor (open o private) en el campo oculto para enviarlo
              matchTypeInput.value = btn.dataset.value;
            });
        }
      });

      // --- SCRIPT DEL SLIDER ---
      const slider = document.querySelector('.slider');
      const levelDisplay = document.getElementById('level-display');

      function updateSlider() {
        levelDisplay.textContent = 'LVL ' + parseFloat(slider.value).toFixed(1); 
      }
      
      if(slider) {
          slider.addEventListener('input', updateSlider);
          updateSlider(); 
      }
    </script>
  </main>
</body>
</html>
