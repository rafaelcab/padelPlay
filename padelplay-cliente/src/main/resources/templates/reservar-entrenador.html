<!DOCTYPE html>
<html class="dark" lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::th:block}, ~{::main})}">

<head>
    <title>Apuntarse - Vantage Padel</title>
    <th:block>
        <!-- Reutilizamos config de Tailwind desde el layout o podemos redefinirla si es necesario -->
    </th:block>
</head>

<main th:fragment="main" class="flex-1 pt-24 px-6 md:px-12 max-w-3xl mx-auto w-full flex flex-col gap-12 pb-24">
    <header class="flex flex-col gap-4">
        <a th:href="@{/entrenadores}" class="inline-flex items-center text-on-surface-variant hover:text-primary transition-colors text-sm mb-4">
            <span class="material-symbols-outlined text-sm mr-1">arrow_back</span>
            Volver a entrenadores
        </a>
        <h1 class="font-display text-3xl md:text-4xl font-bold text-on-surface">
            Solicitar <span class="text-primary italic">Entrenamiento</span>
        </h1>
        <p class="font-body text-on-surface-variant">
            Estás a punto de enviar una solicitud al entrenador <strong class="text-white" th:text="${entrenador.nombre != null ? entrenador.nombre : entrenador.apodo}">Entrenador</strong>.
        </p>
    </header>

    <div class="bg-surface-container-high rounded-3xl p-6 md:p-8 shadow-xl border border-outline-variant/20">
        
        <div class="flex items-center gap-6 mb-8 pb-8 border-b border-outline-variant/30">
            <img th:src="${entrenador.fotoUrl != null ? entrenador.fotoUrl : 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&q=80&w=600'}"
                 class="w-20 h-20 rounded-full object-cover border-2 border-primary"
                 alt="Foto Entrenador">
            <div>
                <h3 class="font-display text-2xl font-bold text-on-surface" th:text="${entrenador.nombre != null ? entrenador.nombre : entrenador.apodo}">Nombre Entrenador</h3>
                <p class="text-primary font-medium" th:text="${entrenador.especialidad != null ? entrenador.especialidad : 'Especialista en pádel'}">Especialidad</p>
                <div class="flex items-center gap-2 mt-2 text-sm text-on-surface-variant">
                    <span class="material-symbols-outlined text-xs">payments</span>
                    <span th:text="${entrenador.precioHoraParticular != null ? entrenador.precioHoraParticular + '€/h' : 'Consultar'}">45€/h</span>
                </div>
            </div>
        </div>

        <form th:action="@{/entrenadores/reservar/{id}(id=${entrenador.id})}" method="post" class="flex flex-col gap-6">
            
            <div class="flex flex-col gap-2">
                <label for="mensaje" class="font-display font-medium text-on-surface text-sm">
                    Mensaje (opcional)
                </label>
                <textarea id="mensaje" name="mensaje" rows="4" 
                          class="w-full rounded-2xl bg-surface-container border border-outline-variant/50 px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none"
                          placeholder="Ej: Hola, me gustaría dar clases de perfeccionamiento los martes por la tarde..."></textarea>
                <p class="text-xs text-on-surface-variant mt-1">El entrenador recibirá este mensaje junto con tu solicitud y se pondrá en contacto contigo.</p>
            </div>

            <div class="flex items-center gap-4 mt-4">
                <button type="submit" class="inline-flex items-center justify-center flex-1 rounded-2xl bg-primary-fixed text-on-primary-fixed px-6 py-4 font-bold transition-all duration-300 hover:bg-primary active:scale-95 shadow-lg shadow-primary-fixed/15">
                    <span class="material-symbols-outlined mr-2">send</span>
                    Enviar Solicitud
                </button>
                <a th:href="@{/entrenadores}" class="inline-flex items-center justify-center flex-1 rounded-2xl border border-outline-variant text-on-surface px-6 py-4 font-bold transition-all duration-300 hover:bg-surface-container hover:border-transparent">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</main>
</html>
