<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - PadelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0c0e10, #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(23, 26, 28, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Contenedor del Logo */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .brand-logo span {
            color: #d1fc00; /* Color verde lima del estilo Vantage */
            font-size: 32px;
        }

        .brand-name {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #d1fc00;
            letter-spacing: -1px;
            font-size: 20px;
            margin: 0;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            box-sizing: border-box; /* Evita que el padding ensanche el input */
            padding: 14px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background-color: #1d2023;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            background-color: #292c30;
            border: 2px solid #22c55e;
            box-shadow:  0 0 8px #22c55e;
        }

        .error {
            color: #ff7351;
            font-size: 12px;
            display: none;
            margin-bottom: 10px;
        }

        .error.show { display: block; }

        input.invalid { border: 1px solid #ff7351; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #d1fc00;
            color: #3c4a00;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #f4ffc6;
            transform: scale(1.02);
        }

        .login {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }

        .login a {
            color: #d1fc00;
            text-decoration: none;
            font-weight: bold;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
            font-size: 13px;
            color: #94a3b8;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #d1fc00;
        }

        .checkbox-container a { color: #d1fc00; text-decoration: none; }
    </style>
</head>

<body>

<div class="card">
    <header class="brand-header">
        <div class="brand-logo">
            <span class="material-symbols-outlined">sports_tennis</span>
            <h2 class="brand-name">PadelPlay</h2>
        </div>
        <h1>Join the Court</h1>
        <p>Crea tu cuenta para empezar a competir</p>
    </header>

    <form action="/auth/register" method="post" onsubmit="return validarContraseñas()">

        <input type="text" name="username" placeholder="Usuario" required>

        <input type="email" name="email" placeholder="Correo electrónico" required>

        <input type="password" id="password" name="password" placeholder="Contraseña" required>

        <input type="password" id="confirmPassword" placeholder="Repetir contraseña"
               required oninput="validarEnTiempoReal()">

        <div id="errorMensaje" class="error">Las contraseñas no coinciden</div>

        <div class="checkbox-container">
            <input type="checkbox" id="privacidad" name="privacidad" required>
            <label for="privacidad">Acepto los <a href="/privacidad" target="_blank">términos de privacidad</a></label>
        </div>
        <div id="errorPrivacidad" class="error">Debes aceptar los términos de privacidad</div>

        <button type="submit">REGISTER →</button>
    </form>
    
    <!-- Separador entre registro manual y Google -->
    <div style="text-align: center; margin: 20px 0; color: #64748b; font-size: 14px;">
        <hr style="border: 0; border-top: 1px solid #374151; margin: 0 0 10px 0;">
        o registrate con
        <hr style="border: 0; border-top: 1px solid #374151; margin: 10px 0 0 0;">
    </div>

    <!-- Botón de Google -->
    <button type="button" onclick="iniciarRegistroGoogle()" 
            style="width: 100%; padding: 15px; background: #db4437; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
    </button>

    <div class="login">
        ¿Ya tienes cuenta? <a href="/login">Login</a>
    </div>
</div>

<script>
function validarEnTiempoReal() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorMensaje = document.getElementById("errorMensaje");
    const confirmInput = document.getElementById("confirmPassword");

    if (confirmPassword.length > 0 && password !== confirmPassword) {
        errorMensaje.classList.add("show");
        confirmInput.classList.add("invalid");
    } else {
        errorMensaje.classList.remove("show");
        confirmInput.classList.remove("invalid");
    }
}

function validarContraseñas() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const privacidad = document.getElementById("privacidad").checked;
    const errorPrivacidad = document.getElementById("errorPrivacidad");

    let esValido = true;

    if (password !== confirmPassword) {
        document.getElementById("errorMensaje").classList.add("show");
        document.getElementById("confirmPassword").classList.add("invalid");
        esValido = false;
    }

    if (!privacidad) {
        errorPrivacidad.classList.add("show");
        esValido = false;
    } else {
        errorPrivacidad.classList.remove("show");
    }

    return esValido;
}

function iniciarRegistroGoogle() {
    // Redirecciona al endpoint de autenticación de Google
    window.location.href = '/auth/google/register';
}
</script>

</body>
</html>
