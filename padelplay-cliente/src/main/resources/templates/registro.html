<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - PadelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0c0e10, #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(23, 26, 28, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Contenedor del Logo */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .brand-logo span {
            color: #d1fc00; /* Color verde lima del estilo Vantage */
            font-size: 32px;
        }

        .brand-name {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #d1fc00;
            letter-spacing: -1px;
            font-size: 20px;
            margin: 0;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            box-sizing: border-box; /* Evita que el padding ensanche el input */
            padding: 14px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background-color: #1d2023;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            background-color: #292c30;
            border: 2px solid #22c55e;
            box-shadow:  0 0 8px #22c55e;
        }

        .error {
            color: #ff7351;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .error.show { display: block; }

        input.invalid { border: 1px solid #ff7351; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #d1fc00;
            color: #3c4a00;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #f4ffc6;
            transform: scale(1.02);
        }

        .login {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }

        .login a {
            color: #d1fc00;
            text-decoration: none;
            font-weight: bold;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
            font-size: 13px;
            color: #94a3b8;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #d1fc00;
        }

        .checkbox-container a { color: #d1fc00; text-decoration: none; }
    </style>
</head>

<body>

<div class="card">
    <header class="brand-header">
        <div class="brand-logo">
            <span class="material-symbols-outlined">sports_tennis</span>
            <h2 class="brand-name">PadelPlay</h2>
        </div>
        <h1>Join the Court</h1>
        <p>Crea tu cuenta para empezar a competir</p>
    </header>

    <form action="/registro" method="post" th:object="${registro}" onsubmit="return validarContraseñas()">

        <input type="text" name="nombre" placeholder="Nombre" th:field="*{nombre}" required>

        <input type="email" name="email" placeholder="Correo electrónico" th:field="*{email}" required>

        <input type="password" id="password" name="password" placeholder="Contraseña" th:field="*{password}" required>

        <input type="password" id="confirmPassword" placeholder="Repetir contraseña"
               required oninput="validarEnTiempoReal()">

        <div id="errorMensaje" class="error" style="display:none;">Las contraseñas no coinciden</div>

        <div class="checkbox-container">
            <input type="checkbox" id="privacidad" name="privacidad" required>
            <label for="privacidad">Acepto los <a href="/privacidad" target="_blank">términos de privacidad</a></label>
        </div>
        <div id="errorPrivacidad" class="error" style="display:none;">Debes aceptar los términos de privacidad</div>

        <div class="error" th:if="${error}" th:text="${error}"></div>

        <button type="submit">REGISTER →</button>
    </form>

    <div class="login">
        ¿Ya tienes cuenta? <a href="/google-test">Inicia sesión</a>
    </div>
</div>

<script>
function validarEnTiempoReal() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorMensaje = document.getElementById("errorMensaje");
    const confirmInput = document.getElementById("confirmPassword");

    if (confirmPassword.length > 0 && password !== confirmPassword) {
        errorMensaje.style.display = "block";
        confirmInput.classList.add("invalid");
    } else {
        errorMensaje.style.display = "none";
        confirmInput.classList.remove("invalid");
    }
}

function validarContraseñas() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const privacidad = document.getElementById("privacidad").checked;
    const errorPrivacidad = document.getElementById("errorPrivacidad");

    let esValido = true;

    if (password !== confirmPassword) {
        document.getElementById("errorMensaje").style.display = "block";
        document.getElementById("confirmPassword").classList.add("invalid");
        esValido = false;
    }

    if (!privacidad) {
        errorPrivacidad.style.display = "block";
        esValido = false;
    } else {
        errorPrivacidad.style.display = "none";
    }

    return esValido;
}
</script>

</body>
</html>
