<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - PadelPlay</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #16a34a;
        }
        input:focus {
            outline: none;
            border: 2px solid #38bdf8; 
            box-shadow: 0 0 5px #38bdf8;
        }

        .error {
            color: #ef4444;
            font-size: 12px;
            margin-top: -5px;
            margin-bottom: 8px;
            display: none;
        }

        .error.show {
            display: block;
        }

        input.invalid {
            border: 2px solid #ef4444;
            box-shadow: 0 0 5px #ef4444;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro PadelPlay</h2>

    <form action="/registro" method="post" onsubmit="return validarContraseñas()">
        <input type="text" name="nombre" placeholder="Nombre completo" required>

        <input type="email" name="email" placeholder="Correo electrónico" required>

        <input type="password" id="password" name="password" placeholder="Contraseña" required>

        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmar contraseña" required oninput="validarEnTiempoReal()">
        
        <div id="errorMensaje" class="error">Las contraseñas no coinciden</div>

        <button type="submit">Registrarse</button>
    </form>
</div>

<script>
    function validarEnTiempoReal() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const errorMensaje = document.getElementById("errorMensaje");
        const confirmInput = document.getElementById("confirmPassword");

        if (confirmPassword.length > 0 && password !== confirmPassword) {
            errorMensaje.classList.add("show");
            confirmInput.classList.add("invalid");
        } else {
            errorMensaje.classList.remove("show");
            confirmInput.classList.remove("invalid");
        }
    }

    function validarContraseñas() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
            document.getElementById("errorMensaje").classList.add("show");
            document.getElementById("confirmPassword").classList.add("invalid");
            return false;
        }
        return true;
    }
</script>

</body>
</html>
