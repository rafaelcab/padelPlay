<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - PadelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0c0e10, #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(23, 26, 28, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Contenedor del Logo */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .brand-logo span {
            color: #d1fc00; /* Color verde lima del estilo Vantage */
            font-size: 32px;
        }

        .brand-name {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #d1fc00;
            letter-spacing: -1px;
            font-size: 20px;
            margin: 0;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            box-sizing: border-box; /* Evita que el padding ensanche el input */
            padding: 14px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background-color: #1d2023;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            background-color: #292c30;
            border: 2px solid #22c55e;
            box-shadow:  0 0 8px #22c55e;
        }

        .error {
            color: #ff7351;
            font-size: 12px;
            display: none;
            margin-bottom: 10px;
        }

        .error.show { display: block; }

        input.invalid { border: 1px solid #ff7351; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #d1fc00;
            color: #3c4a00;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #f4ffc6;
            transform: scale(1.02);
        }

        .login {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }

        .login a {
            color: #d1fc00;
            text-decoration: none;
            font-weight: bold;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
            font-size: 13px;
            color: #94a3b8;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #d1fc00;
        }

        .checkbox-container a { color: #d1fc00; text-decoration: none; }

        /* Separador */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #64748b;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #374151;
        }

        .divider span {
            padding: 0 15px;
        }

        /* Contenedor botón Google */
        #google-signin-btn {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Spinner de carga */
        .spinner-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #374151;
            border-top: 4px solid #d1fc00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner-text {
            margin-top: 20px;
            color: #d1fc00;
            font-size: 16px;
        }

        /* Error de Google */
        .google-error {
            display: none;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            color: #ff7351;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }

        .google-error.show {
            display: block;
        }
    </style>
</head>

<body>

<!-- Spinner Overlay -->
<div class="spinner-overlay" id="spinner">
    <div class="spinner"></div>
    <div class="spinner-text" id="spinnerText">Procesando...</div>
</div>

<div class="card">
    <header class="brand-header">
        <div class="brand-logo">
            <span class="material-symbols-outlined">sports_tennis</span>
            <h2 class="brand-name">PadelPlay</h2>
        </div>
        <h1>Join the Court</h1>
        <p>Crea tu cuenta para empezar a competir</p>
    </header>

    <form id="registroForm" onsubmit="return registrarUsuario(event)">

        <input type="text" id="username" name="username" placeholder="Usuario" required>

        <input type="email" id="email" name="email" placeholder="Correo electrónico" required>

        <input type="password" id="password" name="password" placeholder="Contraseña" required>

        <input type="password" id="confirmPassword" placeholder="Repetir contraseña"
               required oninput="validarEnTiempoReal()">

        <div id="errorMensaje" class="error">Las contraseñas no coinciden</div>
        
        <!-- Error del servidor -->
        <div class="google-error" id="registroError"></div>

        <div class="checkbox-container">
            <input type="checkbox" id="privacidad" name="privacidad" required>
            <label for="privacidad">Acepto los <a href="/privacidad" target="_blank">términos de privacidad</a></label>
        </div>
        <div id="errorPrivacidad" class="error">Debes aceptar los términos de privacidad</div>

        <button type="submit">REGISTER →</button>
    </form>
    
    <!-- Separador entre registro manual y Google -->
    <div class="divider">
        <span>o regístrate con</span>
    </div>

    <!-- Error de Google -->
    <div class="google-error" id="googleError"></div>

    <!-- Botón real de Google Sign-In -->
    <div id="google-signin-btn"></div>

    <div class="login">
        ¿Ya tienes cuenta? <a href="/login">Login</a>
    </div>
</div>

<script>
// ====================================
// CONFIGURACIÓN
// ====================================
const GOOGLE_CLIENT_ID = '75813445817-4rvtubv93v7tcc3h7o3t8tu5s8u4tbsn.apps.googleusercontent.com';
const API_URL_GOOGLE = 'http://localhost:8080/api/auth/google';
const API_URL_REGISTER = 'http://localhost:8080/api/auth/register';

// ====================================
// UTILIDADES
// ====================================

function showSpinner(message) {
    document.getElementById('spinnerText').textContent = message || 'Procesando...';
    document.getElementById('spinner').classList.add('active');
}

function hideSpinner() {
    document.getElementById('spinner').classList.remove('active');
}

function showError(elementId, message) {
    const errorEl = document.getElementById(elementId);
    errorEl.textContent = '❌ ' + message;
    errorEl.classList.add('show');
}

function hideError(elementId) {
    document.getElementById(elementId).classList.remove('show');
}

// ====================================
// VALIDACIONES DEL FORMULARIO
// ====================================

function validarEnTiempoReal() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorMensaje = document.getElementById("errorMensaje");
    const confirmInput = document.getElementById("confirmPassword");

    if (confirmPassword.length > 0 && password !== confirmPassword) {
        errorMensaje.classList.add("show");
        confirmInput.classList.add("invalid");
    } else {
        errorMensaje.classList.remove("show");
        confirmInput.classList.remove("invalid");
    }
}

function validarFormulario() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const privacidad = document.getElementById("privacidad").checked;
    const errorPrivacidad = document.getElementById("errorPrivacidad");

    let esValido = true;
    hideError('registroError');

    if (password !== confirmPassword) {
        document.getElementById("errorMensaje").classList.add("show");
        document.getElementById("confirmPassword").classList.add("invalid");
        esValido = false;
    }

    if (!privacidad) {
        errorPrivacidad.classList.add("show");
        esValido = false;
    } else {
        errorPrivacidad.classList.remove("show");
    }

    return esValido;
}

// ====================================
// REGISTRO MANUAL
// ====================================

function registrarUsuario(event) {
    event.preventDefault();
    
    if (!validarFormulario()) {
        return false;
    }

    const nombre = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    showSpinner('Creando tu cuenta...');
    hideError('registroError');

    fetch(API_URL_REGISTER, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            nombre: nombre,
            email: email,
            password: password
        })
    })
    .then(res => {
        if (!res.ok) {
            return res.json().then(err => { throw err; });
        }
        return res.json();
    })
    .then(data => {
        hideSpinner();
        
        // Guardar token en sessionStorage
        sessionStorage.setItem('padelplay_token', data.token);
        
        // Registro exitoso -> siempre va a selección de rol
        window.location.href = '/perfil/seleccionar-rol?token=' + data.token;
    })
    .catch(error => {
        hideSpinner();
        showError('registroError', error.error || 'Error al registrar. Inténtalo de nuevo.');
        console.error('Error:', error);
    });

    return false;
}

// ====================================
// GOOGLE SIGN-IN
// ====================================

function handleCredentialResponse(response) {
    console.log('Google credential received');
    hideError('googleError');
    showSpinner('Iniciando sesión con Google...');

    fetch(API_URL_GOOGLE, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            credential: response.credential
        })
    })
    .then(res => {
        if (!res.ok) {
            return res.json().then(err => { throw err; });
        }
        return res.json();
    })
    .then(data => {
        hideSpinner();
        
        // Guardar token en sessionStorage
        sessionStorage.setItem('padelplay_token', data.token);
        
        // Redirigir según si es nuevo usuario o no
        if (data.nuevoUsuario) {
            window.location.href = '/perfil/seleccionar-rol?token=' + data.token;
        } else {
            window.location.href = '/perfil/dashboard?token=' + data.token;
        }
    })
    .catch(error => {
        hideSpinner();
        showError('googleError', error.error || 'Error al iniciar sesión con Google');
        console.error('Error:', error);
    });
}

// ====================================
// INICIALIZACIÓN
// ====================================

window.onload = function() {
    if (typeof google !== 'undefined' && google.accounts) {
        initializeGoogleSignIn();
    } else {
        setTimeout(function() {
            if (typeof google !== 'undefined' && google.accounts) {
                initializeGoogleSignIn();
            } else {
                console.error('No se pudo cargar Google Sign-In SDK');
                showError('googleError', 'No se pudo cargar Google Sign-In. Recarga la página.');
            }
        }, 1000);
    }
};

function initializeGoogleSignIn() {
    google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
    });

    google.accounts.id.renderButton(
        document.getElementById('google-signin-btn'),
        {
            theme: 'filled_black',
            size: 'large',
            width: 310,
            text: 'signup_with',
            shape: 'rectangular',
            logo_alignment: 'center'
        }
    );
}
</script>

</body>
</html>
