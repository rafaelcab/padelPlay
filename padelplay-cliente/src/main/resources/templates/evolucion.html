<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::style}, ~{::main})}">

<head>
    <title>Evolución de nivel - PadelPlay</title>
    <style>
        .main-content {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 28px;
            color: #eeeef0;
            margin-bottom: 10px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
        }

        .page-description {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .card {
            background: #1d2023;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
            gap: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #eeeef0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-edit {
            background: #D4FF00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit:hover {
            background: #bade00;
            box-shadow: 0 0 10px rgba(212, 255, 0, 0.3);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(220, 38, 38, 0.1);
            color: #fca5a5;
            border: 1px solid #7f1d1d;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #D4FF00;
        }

        .chart-wrapper {
            background: #0f1113;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 28px;
            height: 360px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .elo-table {
            width: 100%;
            border-collapse: collapse;
            color: #eeeef0;
        }

        .elo-table th,
        .elo-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        .elo-table th {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .elo-value {
            color: #D4FF00;
            font-weight: 700;
        }

        .actions {
            display: flex;
            justify-content: flex-start;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <main class="main-content">
        <h1 class="page-title">Evolución de nivel</h1>
        <p class="page-description">
            Sigue cómo cambia tu ELO con el tiempo y observa tu progresión partido a partido.
        </p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <div class="card-header">
                <div class="card-title"><span class="material-symbols-outlined">trending_up</span> Historial ELO</div>
            </div>

            <div class="chart-wrapper" th:if="${puntosElo != null && !puntosElo.empty}">
                <canvas id="eloChart" aria-label="Gráfica de evolución ELO" role="img"></canvas>
            </div>

            <div class="table-wrapper" th:if="${puntosElo != null && !puntosElo.empty}">
                <table class="elo-table" id="eloDataTable">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>ELO</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="punto : ${puntosElo}"
                            th:data-label="${punto.fecha != null ? #temporals.format(punto.fecha, 'dd/MM/yyyy') : 'Sin fecha'}"
                            th:data-elo="${punto.elo}">
                            <td th:text="${punto.fecha != null ? #temporals.format(punto.fecha, 'dd MMM yyyy - HH:mm') : 'Sin fecha'}">10 may 2026 - 18:30</td>
                            <td class="elo-value" th:text="${punto.elo != null ? #numbers.formatDecimal(punto.elo, 1, 2) : 'Sin ELO'}">3.20</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${puntosElo == null || puntosElo.empty}">
                <div class="empty-state-icon"><span class="material-symbols-outlined" style="font-size: 48px;">show_chart</span></div>
                <p>Todavía no hay datos de evolución ELO. Cuando empieces a generar historial, lo verás aquí.</p>
            </div>

            <div class="actions">
                <a href="/perfil/mi-perfil" class="btn-edit">Volver al dashboard</a>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            (function () {
                const canvas = document.getElementById('eloChart');
                const rows = document.querySelectorAll('#eloDataTable tbody tr');
                if (!canvas || rows.length === 0 || typeof Chart === 'undefined') {
                    return;
                }

                const labels = [];
                const values = [];

                rows.forEach(function (row) {
                    const elo = Number(row.dataset.elo);
                    if (!Number.isNaN(elo)) {
                        labels.push(row.dataset.label || 'Sin fecha');
                        values.push(elo);
                    }
                });

                if (values.length === 0) {
                    return;
                }

                new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'ELO',
                            data: values,
                            borderColor: '#D4FF00',
                            backgroundColor: 'rgba(212, 255, 0, 0.12)',
                            pointBackgroundColor: '#D4FF00',
                            pointBorderColor: '#0f1113',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                labels: {
                                    color: '#eeeef0'
                                }
                            },
                            title: {
                                display: true,
                                text: 'Evolución ELO',
                                color: '#eeeef0',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    color: '#94a3b8'
                                },
                                grid: {
                                    color: 'rgba(148, 163, 184, 0.12)'
                                },
                                title: {
                                    display: true,
                                    text: 'Fecha',
                                    color: '#94a3b8'
                                }
                            },
                            y: {
                                ticks: {
                                    color: '#94a3b8'
                                },
                                grid: {
                                    color: 'rgba(148, 163, 184, 0.12)'
                                },
                                title: {
                                    display: true,
                                    text: 'ELO',
                                    color: '#94a3b8'
                                }
                            }
                        }
                    }
                });
            })();
        </script>
    </main>
</body>

</html>
