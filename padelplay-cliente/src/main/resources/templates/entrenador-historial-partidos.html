<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{base :: layout(~{::title}, ~{::style}, ~{::div#content-wrapper})}">

<head>
    <title>Historial de Partidos - PadelPlay</title>
    <style>
        :root {
            --color-background: #0c0e10;
            --color-surface-container-low: #111416;
            --color-surface-container-high: #1d2023;
            --color-surface-container-highest: #232629;
            --color-surface-bright: #292c30;
            --color-primary: #f4ffc6;
            --color-primary-fixed: #d1fc00;
            --color-primary-dim: #c7ef00;
            --color-on-primary-fixed: #3c4a00;
            --color-secondary: #e2e2e5;
            --color-on-surface: #eeeef0;
            --color-on-surface-variant: #aaabad;
            --color-outline-variant: #46484a;
            --color-error: #ff7351;
            --font-headline: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-background);
            color: var(--color-on-surface);
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            margin-top: 2rem;
        }

        .brand-eyebrow {
            font-family: var(--font-headline);
            font-weight: 800;
            font-style: italic;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: var(--color-primary-fixed);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            color: var(--color-secondary);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--color-on-surface-variant);
            font-size: 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .error-message {
            background: rgba(255, 115, 81, 0.12);
            border: 1px solid rgba(255, 115, 81, 0.3);
            color: var(--color-error);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .partidos-grid {
            display: grid;
            gap: 1.5rem;
        }

        .partido-card {
            background: rgba(17, 20, 22, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .partido-card:hover {
            background: rgba(29, 32, 35, 0.9);
        }

        .partido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .partido-info {
            flex: 1;
        }

        .partido-fecha {
            font-size: 0.9rem;
            color: var(--color-on-surface-variant);
            margin-bottom: 0.5rem;
        }

        .partido-ubicacion {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-on-surface);
            margin-bottom: 0.5rem;
        }

        .partido-nivel {
            display: inline-block;
            background: rgba(209, 252, 0, 0.1);
            color: var(--color-primary-fixed);
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 0.5rem;
        }

        .partido-jugadores {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .jugador-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--color-surface-container-highest);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }

        .jugador-avatar {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: var(--color-primary-fixed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-on-primary-fixed);
            font-weight: 700;
            font-size: 0.75rem;
        }

        .partido-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 0.5rem;
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: var(--color-primary-fixed);
            color: var(--color-on-primary-fixed);
        }

        .btn-primary:hover {
            background: var(--color-primary);
        }

        .btn-secondary {
            background: var(--color-surface-container-highest);
            color: var(--color-on-surface);
            border: 1px solid var(--color-outline-variant);
        }

        .btn-secondary:hover {
            background: var(--color-surface-bright);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-on-surface-variant);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .feedback-badge {
            display: inline-block;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.5rem;
        }
    </style>
</head>

<body>
    <div id="content-wrapper" class="w-full">
        <div class="container">
            <div class="header">
                <p class="brand-eyebrow">PadelPlay Entrenador</p>
                <h1>Historial de Partidos</h1>
                <p class="subtitle">Revisa los partidos de tus alumnos y proporciona feedback</p>
            </div>

            <div class="error-message" th:if="${error}" th:text="${error}"></div>

            <div class="partidos-grid" th:if="${!partidos.isEmpty()}">
                <div th:each="partido : ${partidos}" class="partido-card">
                    <div class="partido-header">
                        <div class="partido-info">
                            <div class="partido-fecha" th:text="${#temporals.format(partido.fechaHora, 'dd/MMM/yyyy HH:mm')}"></div>
                            <div class="partido-ubicacion" th:text="${partido.ubicacion}"></div>
                            <div>
                                <span class="partido-nivel" th:text="'Nivel: ' + ${#numbers.formatDecimal(partido.nivelRequerido, 1, 1)}"></span>
                                <span class="partido-nivel" th:text="${partido.tipoPartido == 'PRIVADO' ? 'Privado' : 'Abierto'}"></span>
                                <span class="feedback-badge" th:if="${partido.tieneFeedback}">✓ Valorado</span>
                            </div>
                        </div>
                    </div>

                    <div class="partido-jugadores">
                        <div class="jugador-badge">
                            <span class="material-symbols-outlined" style="font-size: 1rem;">person</span>
                            <span>Creador: <strong th:text="${partido.creador.apodo}"></strong></span>
                        </div>
                        <div th:each="jugador : ${partido.jugadoresApuntados}" class="jugador-badge">
                            <div class="jugador-avatar" th:text="${#strings.substring(jugador.apodo,0,1).toUpperCase()}"></div>
                            <span th:text="${jugador.apodo}"></span>
                        </div>
                    </div>

                    <div class="partido-actions">
                        <a th:href="@{/perfil/entrenador/valorar-partido/{id}(id=${partido.id})}" class="btn-primary">
                            Valorar Partido
                        </a>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${partidos.isEmpty()}">
                <div class="empty-state-icon">📋</div>
                <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">No hay partidos disponibles</h2>
                <p>Los partidos de tus alumnos aparecerán aquí una vez que se completen.</p>
            </div>
        </div>
    </div>
</body>

</html>
