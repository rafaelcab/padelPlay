<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <title>PadelPlay - Login</title>

  <style>
    :root {
      --color-background: #0c0e10;
      --color-surface-container-high: #1d2023;
      --color-surface-bright: #292c30;
      --color-surface-variant: #232629;
      --color-primary: #f4ffc6;
      --color-primary-fixed: #d1fc00;
      --color-primary-dim: #c7ef00;
      --color-on-primary-fixed: #3c4a00;
      --color-secondary: #e2e2e5;
      --color-on-surface: #eeeef0;
      --color-on-surface-variant: #aaabad;
      --color-outline-variant: #46484a;
      --color-error: #ff7351;
      --color-error-border: rgba(255, 115, 81, 0.3);
      --color-success: #d1fc00;
      --font-headline: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-background);
      color: var(--color-on-surface);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    a {
      text-decoration: none;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-radial {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: radial-gradient(circle at center, rgba(209, 252, 0, 0.08) 0%, rgba(12, 14, 16, 1) 70%);
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.2;
      filter: grayscale(1);
      transform: scale(1.1);
    }

    .orb-top-right,
    .orb-bottom-left {
      position: fixed;
      border-radius: 9999px;
      pointer-events: none;
      z-index: 0;
    }

    .orb-top-right {
      top: 0;
      right: 0;
      width: 500px;
      height: 500px;
      background: rgba(209, 252, 0, 0.1);
      filter: blur(120px);
      transform: translate(50%, -50%);
    }

    .orb-bottom-left {
      bottom: 0;
      left: 0;
      width: 400px;
      height: 400px;
      background: rgba(185, 41, 2, 0.05);
      filter: blur(100px);
      transform: translate(-50%, 50%);
    }

    .login-shell {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 440px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-title {
      font-family: var(--font-headline);
      font-weight: 900;
      font-style: italic;
      font-size: 2.25rem;
      letter-spacing: -0.05em;
      color: var(--color-primary-fixed);
      margin-bottom: 0.5rem;
    }

    .brand-subtitle {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--color-secondary);
    }

    .glass-card {
      background: rgba(17, 20, 22, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0.25rem;
    }

    .field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-on-surface-variant);
      padding: 0 0.25rem;
    }

    .forgot-link {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-on-surface-variant);
      cursor: default;
      opacity: 0.7;
    }

    .input-wrapper {
      position: relative;
    }

    .text-input {
      width: 100%;
      background-color: var(--color-surface-container-high);
      border: none;
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-on-surface);
      outline: none;
      transition: background-color 0.2s, box-shadow 0.2s;
    }

    .text-input::placeholder {
      color: rgba(170, 171, 173, 0.5);
    }

    .text-input:focus {
      background-color: var(--color-surface-bright);
      box-shadow: 0 0 0 1px rgba(209, 252, 0, 0.2);
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-on-surface-variant);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--color-on-surface);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 1.25rem;
    }

    .feedback {
      display: none;
      border-radius: 0.75rem;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .feedback.show {
      display: block;
    }

    .feedback.error {
      background: rgba(255, 115, 81, 0.12);
      border: 1px solid var(--color-error-border);
      color: var(--color-error);
    }

    .feedback.success {
      background: rgba(209, 252, 0, 0.12);
      border: 1px solid rgba(209, 252, 0, 0.3);
      color: var(--color-success);
    }

    .btn-login {
      margin-top: 0.5rem;
      width: 100%;
      background-color: var(--color-primary-fixed);
      color: var(--color-on-primary-fixed);
      font-family: var(--font-headline);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.05em;
      padding: 1rem;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(209, 252, 0, 0.2);
      transition: background-color 0.2s, transform 0.1s, opacity 0.2s;
    }

    .btn-login:hover {
      background-color: var(--color-primary-dim);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.75;
      cursor: wait;
    }

    .divider {
      position: relative;
      padding: 0.5rem 0 0.25rem;
    }

    .divider-line {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
    }

    .divider-line::after {
      content: '';
      display: block;
      width: 100%;
      border-top: 1px solid rgba(70, 72, 74, 0.2);
    }

    .divider-text {
      position: relative;
      display: flex;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-on-surface-variant);
    }

    .divider-text span {
      background-color: transparent;
      padding: 0 1rem;
    }

    .google-shell {
      border: 1px solid rgba(70, 72, 74, 0.3);
      border-radius: 9999px;
      padding: 0.65rem 0.9rem;
      background: transparent;
      transition: background-color 0.2s;
    }

    .google-shell:hover {
      background-color: var(--color-surface-variant);
    }

    #google-signin-btn {
      display: flex;
      justify-content: center;
      min-height: 40px;
    }

    .google-hint {
      font-size: 0.8rem;
      color: var(--color-on-surface-variant);
      text-align: center;
      margin-top: 0.75rem;
    }

    .footer-nav {
      margin-top: 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .signup-text {
      font-size: 0.875rem;
      color: var(--color-on-surface-variant);
    }

    .signup-link {
      font-weight: 700;
      color: var(--color-primary-fixed);
      margin-left: 0.25rem;
      transition: text-decoration 0.2s;
    }

    .signup-link:hover {
      text-decoration: underline;
    }

    .legal-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(170, 171, 173, 0.5);
    }

    .legal-links a {
      color: inherit;
      transition: color 0.2s;
    }

    .legal-links a:hover {
      color: var(--color-primary-fixed);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(12, 14, 16, 0.75);
      backdrop-filter: blur(10px);
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2rem;
      border-radius: 1rem;
      background: rgba(17, 20, 22, 0.9);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .spinner {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 9999px;
      border: 4px solid rgba(170, 171, 173, 0.25);
      border-top-color: var(--color-primary-fixed);
      animation: spin 0.85s linear infinite;
    }

    .loading-text {
      font-family: var(--font-headline);
      font-weight: 700;
      color: var(--color-on-surface);
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 540px) {
      body {
        padding: 1rem;
      }

      .glass-card {
        padding: 1.5rem;
      }

      .brand-title {
        font-size: 1.8rem;
      }

      .brand-subtitle {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div class="bg-layer">
    <div class="bg-radial"></div>
    <img
      class="bg-image"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxZDh0pTXS6GyrD15wUEJIypguXbBwNRPAXM9fMZpc0uQQePB9GAaj6xG9kd5fZx3rhBfl-T_Tx1akiCbR3HBs2bplbZzNidWUg8Uv0kI3mpWJFjQtMU0aIC9QzXLOsnFDD_lAiuZ36f5AOvSjVnZLjGIO8crq7szdgXkqIp3kfuNzpoxcPNzOjb06LECCVxHjhqNmX-SXuD-cG-i_bMbP1688k2rm7D5oxd-Kc6DksUEyzzFtR2So5mwBLVINGwuhT5MaKG4aI83P"
      alt="Pista de padel iluminada"
    />
  </div>

  <main class="login-shell">
    <div class="brand">
      <h1 class="brand-title">PADELPLAY</h1>
      <p class="brand-subtitle">Vuelve a la pista</p>
    </div>

    <div class="glass-card">
      <form class="form" id="loginForm">
        <div class="field-group">
          <label class="field-label" for="email">Correo electronico</label>
          <div class="input-wrapper">
            <input
              class="text-input"
              id="email"
              name="email"
              type="email"
              placeholder="tu@email.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="field-group">
          <div class="field-header">
            <label class="field-label" for="password">Password</label>
            <span class="forgot-link">Recuperacion pronto</span>
          </div>
          <div class="input-wrapper">
            <input
              class="text-input"
              id="password"
              name="password"
              type="password"
              placeholder="********"
              autocomplete="current-password"
              style="padding-right: 3rem;"
              required
            />
            <button class="toggle-password" id="togglePassword" type="button" aria-label="Mostrar u ocultar password">
              <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
            </button>
          </div>
        </div>

        <div class="feedback error" id="loginFeedback"></div>

        <button class="btn-login" id="loginButton" type="submit">INICIAR SESION</button>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text"><span>O continua con</span></div>
        </div>

        <div class="google-shell">
          <div id="google-signin-btn"></div>
        </div>
        <p class="google-hint">Usa tu cuenta de Google con el flujo ya conectado al backend.</p>

        <div class="feedback error" id="googleFeedback"></div>
      </form>
    </div>

    <div class="footer-nav">
      <p class="signup-text">
        No tienes cuenta?
        <a class="signup-link" href="/registro">Registrate</a>
      </p>
      <div class="legal-links">
        <a href="#">Privacidad</a>
        <a href="#">Terminos</a>
      </div>
    </div>
  </main>

  <div class="orb-top-right"></div>
  <div class="orb-bottom-left"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <p class="loading-text" id="loadingText">Procesando...</p>
    </div>
  </div>

  <script th:inline="javascript">
    const SERVER_API_URL = /*[[${serverApiUrl}]]*/ 'http://localhost:8080';
    const GOOGLE_CLIENT_ID = /*[[${googleClientId}]]*/ '';
  </script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePasswordButton = document.getElementById('togglePassword');
    const toggleIcon = document.getElementById('toggleIcon');
    const loginFeedback = document.getElementById('loginFeedback');
    const googleFeedback = document.getElementById('googleFeedback');
    const loginButton = document.getElementById('loginButton');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');

    const LOGIN_ENDPOINT = SERVER_API_URL + '/api/auth/login';
    const GOOGLE_ENDPOINT = SERVER_API_URL + '/api/auth/google';
    const SESSION_ENDPOINT = '/auth/establecer-sesion';

    togglePasswordButton.addEventListener('click', () => {
      const showing = passwordInput.type === 'text';
      passwordInput.type = showing ? 'password' : 'text';
      toggleIcon.textContent = showing ? 'visibility' : 'visibility_off';
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideFeedback(loginFeedback);
      hideFeedback(googleFeedback);

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showFeedback(loginFeedback, 'Introduce email y password.');
        return;
      }

      setBusy(true, 'Iniciando sesion...');

      try {
        const response = await fetch(LOGIN_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await parseJson(response);
        if (!response.ok) {
          throw new Error(data.error || 'No se pudo iniciar sesion.');
        }

        await establecerSesion(data.token);
        window.location.href = getRedirectPath(data);
      } catch (error) {
        showFeedback(loginFeedback, error.message || 'No se pudo iniciar sesion.');
      } finally {
        setBusy(false);
      }
    });

    async function establecerSesion(token) {
      const response = await fetch(SESSION_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ token })
      });

      const data = await parseJson(response);
      if (!response.ok || data.success !== true) {
        throw new Error(data.error || 'No se pudo guardar la sesion.');
      }
    }

    function getRedirectPath(data) {
      return data.nuevoUsuario ? '/perfil/seleccionar-rol' : '/perfil/dashboard';
    }

    function showFeedback(element, message) {
      element.textContent = message;
      element.classList.add('show');
    }

    function hideFeedback(element) {
      element.textContent = '';
      element.classList.remove('show');
    }

    function setBusy(active, message) {
      loginButton.disabled = active;
      loadingText.textContent = message || 'Procesando...';
      loadingOverlay.classList.toggle('active', active);
    }

    async function parseJson(response) {
      const contentType = response.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) {
        return {};
      }

      try {
        return await response.json();
      } catch (error) {
        return {};
      }
    }

    async function handleCredentialResponse(response) {
      hideFeedback(loginFeedback);
      hideFeedback(googleFeedback);

      if (!response || !response.credential) {
        showFeedback(googleFeedback, 'Google no devolvio una credencial valida.');
        return;
      }

      setBusy(true, 'Iniciando sesion con Google...');

      try {
        const authResponse = await fetch(GOOGLE_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ credential: response.credential })
        });

        const data = await parseJson(authResponse);
        if (!authResponse.ok) {
          throw new Error(data.error || 'No se pudo iniciar sesion con Google.');
        }

        await establecerSesion(data.token);
        window.location.href = getRedirectPath(data);
      } catch (error) {
        showFeedback(googleFeedback, error.message || 'No se pudo iniciar sesion con Google.');
      } finally {
        setBusy(false);
      }
    }

    function initializeGoogleSignIn() {
      if (!GOOGLE_CLIENT_ID) {
        showFeedback(googleFeedback, 'Falta configurar Google Sign-In en el cliente.');
        return;
      }

      const container = document.getElementById('google-signin-btn');
      const width = Math.max(250, Math.min(360, container.parentElement.offsetWidth - 24));

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
      });

      google.accounts.id.renderButton(container, {
        theme: 'filled_black',
        size: 'large',
        shape: 'pill',
        text: 'continue_with',
        width: width
      });
    }

    window.addEventListener('load', () => {
      if (typeof google !== 'undefined' && google.accounts) {
        initializeGoogleSignIn();
        return;
      }

      window.setTimeout(() => {
        if (typeof google !== 'undefined' && google.accounts) {
          initializeGoogleSignIn();
        } else {
          showFeedback(googleFeedback, 'No se pudo cargar Google Sign-In. Recarga la pagina.');
        }
      }, 1000);
    });
  </script>
</body>
</html>
